# Claude Code GitHub Action.
#
# Trigger Claude from issues and PRs:
# - Mention @claude in an issue body, issue title, PR comment, or PR review
# - Or open a new issue (Claude auto-runs on every new issue — adjust below if undesired)
#
# What it does: Claude reads the context, pushes commits to a `claude/...` branch,
# and opens a PR back to the repo. For question-shaped tasks it just comments.
#
# Setup checklist (do once per repo):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Generate an OAuth token: run `claude setup-token` in your local Claude Code CLI.
#      Add it as a repo secret named CLAUDE_CODE_OAUTH_TOKEN.
#      (Alternative for non-Pro/Max users: add ANTHROPIC_API_KEY instead and swap the
#      input below — uses metered API billing instead of subscription quota.)
#   3. Push this file to main. Claude is now triggerable.
#
# Billing: runs on GitHub Actions runners (your CI minutes) + either your Claude
# Pro/Max subscription quota (OAuth) or Anthropic API tokens (API key).
#
# Docs: https://code.claude.com/docs/en/github-actions

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth (default, uses Pro/Max subscription quota — set up via
          # `claude setup-token` locally, then add as a repo secret)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Alternative for non-Pro/Max users: comment the line above and
          # uncomment the line below + set ANTHROPIC_API_KEY secret instead.
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: change the trigger phrase
          # trigger_phrase: "/claude"
          #
          # Optional: auto-trigger when an issue is assigned to a specific user
          # (useful for a Jira → GitHub flow where Jira assigns issues to a bot user)
          # assignee_trigger: "claude-bot"
          #
          # Optional: customize Claude's CLI behavior
          # claude_args: |
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm test),Bash(npm run lint),Bash(npm run build)"
          #   --system-prompt "Follow CLAUDE.md. Never bypass pre-commit hooks. Ensure new code has tests."
