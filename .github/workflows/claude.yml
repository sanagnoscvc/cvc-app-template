# Claude Code GitHub Action.
#
# Trigger Claude by mentioning `@claude` in:
# - an issue body or title (at open time, or by editing afterward)
# - a comment on an issue or PR
# - a PR review body
#
# (This workflow does NOT auto-run on every new issue — the `@claude` mention
# is required. See the `if:` expression on the job below.)
#
# What it does: Claude reads the context, may push commits to a `claude/...`
# branch and post a comment with a link to create the PR. For question-shaped
# tasks it just replies in-thread. Exact behavior depends on the
# `claude-code-action` version and Anthropic's current defaults — confirm with
# the linked docs if you need precise semantics.
#
# Setup checklist (do once per repo):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Get an Anthropic API key: https://console.anthropic.com/settings/keys
#      Add it as a repo secret named ANTHROPIC_API_KEY.
#      (Alternative for Pro/Max subscribers: use OAuth instead — see the
#      commented option below in the action `with:` block.)
#   3. Push this file to main. Claude is now triggerable.
#
# Billing: runs on GitHub Actions runners (your CI minutes) + Anthropic API
# tokens (or your Claude Pro/Max subscription quota if you switch to OAuth).
#
# Docs: https://code.claude.com/docs/en/github-actions

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # Metered API billing via Anthropic API key.
          # Get a key at https://console.anthropic.com/settings/keys, then
          # add as a repo secret named ANTHROPIC_API_KEY.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Alternative for Pro/Max subscribers: comment the line above and
          # uncomment the line below + set CLAUDE_CODE_OAUTH_TOKEN secret
          # (generated via `claude setup-token` locally). Uses subscription
          # quota instead of metered API billing.
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Optional: change the trigger phrase
          # trigger_phrase: "/claude"
          #
          # Optional: auto-trigger when an issue is assigned to a specific user
          # (useful for a Jira → GitHub flow where Jira assigns issues to a bot user)
          # assignee_trigger: "claude-bot"
          #
          # Optional: customize Claude's CLI behavior
          # claude_args: |
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm test),Bash(npm run lint),Bash(npm run build)"
          #   --system-prompt "Follow CLAUDE.md. Never bypass pre-commit hooks. Ensure new code has tests."
